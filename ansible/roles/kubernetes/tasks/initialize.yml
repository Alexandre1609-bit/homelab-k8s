---
- name: "Initialize Kubernetes cluster"
  ansible.builtin.command:
    cmd: kubeadm init --skip-phases=addon/kube-proxy --apiserver-advertise-address={{ ansible_default_ipv4.address }} --pod-network-cidr={{ kubernetes_pod_network_cidr }}
    creates: /etc/kubernetes/admin.conf

- name: "Get user environment name"
  ansible.builtin.getent:
    database: passwd
    key: "{{ ansible_user }}"

- name: "Ensure kubectl config directory exists"
  ansible.builtin.file:
    path: "{{ ansible_facts.getent_passwd[ansible_user][4] }}/.kube"
    state: directory
    mode : '0755'

- name: "Copy admin.conf to user's kube config"
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: "{{ ansible_facts.getent_passwd[ansible_user][4] }}/.kube/config"
    remote_src: true
    mode: '0600'

- name: "Generate join command"
  ansible.builtin.command:
    cmd: kubeadm token create --print-join-command
  register: join_command_output
  changed_when: false

- name: "Store join command in a dummy host"
  ansible.builtin.add_host:
    name: "K8S_TOKEN_HOLDER"
    token: "{{ join_command_output.stdout }}"
